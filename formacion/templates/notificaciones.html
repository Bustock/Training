{% load static %}
<!DOCTYPE html>
<html>
<head>
    <title>FORMACIONES SRCSE</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <style>
        body {
            text-align: center;
            background-color: #f5f7fa;
            background-image: url("{% static 'fondo_esquina.png' %}");
            background-size: auto;
            background-repeat: no-repeat;
            background-position: center center;
            background-attachment: fixed;
            transition: background-size 1s ease, background-position 0.8s ease; /* transición como el otro */
            background-size: 800px 240px; /* Tamaño inicial */
            background-position: center center;
        }
        .button-pop {
            transition: transform 0.2s ease;
        }

        .button-pop.pop-effect {
            transform: scale(1.15);
        }
        body.animate-background {
            background-size: 200px 60px;
            background-position: 10px 10px;
        }

        form, h1 {
            background-color: rgb(0, 132, 203);
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }

        label, h1 {
            font-size: 25px;
            color: rgb(255, 255, 255);
        }

        .message {
            color: rgba(63, 72, 204, 0.829);
        }

        .alert-card {
            background: #ffffff;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            border-left: 6px solid #3b82f6;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.12);
            padding: 12px 16px;
            margin: 12px auto;
            border-radius: 12px;
            max-width: 900px;
            text-align: center;
        }

        .alert-card.success {
            border-left-color: #16a34a;
            color: #166534;
        }

        .alert-card.error {
            border-left-color: #dc2626;
            color: #991b1b;
        }

        .alert-card.warning {
            border-left-color: #f59e0b;
            color: #92400e;
        }

        .alert-card.info {
            border-left-color: #0ea5e9;
            color: #0c4a6e;
        }

        .alert-card p,
        .alert-card h2,
        .alert-card h3 {
            margin: 0;
            color: inherit;
        }

        .button-ripple {
        position: relative;
        overflow: hidden;
        }

        .button-ripple::after {
        content: "";
        position: absolute;
        border-radius: 50%;
        transform: scale(0);
        background: rgba(255, 255, 255, 0.6);
        animation: ripple 0.6s linear;
        }

        @keyframes ripple {
        to {
            transform: scale(4);
            opacity: 0;
        }
        }
        .fixed-back {
            position: fixed;
            top: 10px;
            left: 10px;
            z-index: 1000; 
        }

        .fixed-notif {
            position: fixed;
            top: 10px;
            right: 230px;
            z-index: 1000; 
        }
    </style>
</head>

<body>

    <div class="content">
        <h1>NOTIFICACIONES</h1><br>
            {% for notificacion in notificaciones %}
            <div style="margin-bottom: 10px;">
                <div class="alert-card info">{{ notificacion.mensaje }}</div>
                <form action="{% url 'notificacion_leida' notificacion.id %}" method="post" style="display:inline;">
                    {% csrf_token %}
                    <button type="submit" class="button-pop">
                        Visto <i class="fa fa-eye" aria-hidden="true"></i>
                    </button>
                </form>
            </div><br>
        {% endfor %}
    </div>

    <form class="fixed-back" action="{% url 'inicio' %}" method="post" style="display:inline;">
            {% csrf_token %}
            <button class="button-pop" style="font-size: 18px; padding: 10px 30px;" type="submit">Volver al inicio<br><i class="fa fa-home" aria-hidden="true"></i></button>
        </form>
