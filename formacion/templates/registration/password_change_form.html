{% extends "base.html" %}

{% block content %}
  <h2>Renovación de contraseña</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button style="font-size: 18px; padding: 10px 30px;" type="submit">Cambiar contraseña</button>
  </form>
  {% if messages %}
    <div class="messages">
    {% for message in messages %}
      <div class="alert-card {{ message.tags }}">{{ message }}</div>
    {% endfor %}
    </div>
  {% endif %}
{% endblock %}
