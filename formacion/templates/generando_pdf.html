{% load static %}
<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FORMACIONES SRCSE</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <script src="https://cdn.jsdelivr.net/npm/signature_pad@4.0.0/dist/signature_pad.umd.min.js"></script>
    <style>
        body {
            text-align: center;
            background-color: #f5f7fa;
            background-image: url("{% static 'fondo_esquina.png' %}");
            background-size: 200px 60px;
            background-repeat: no-repeat;
            background-position: 10px 10px;
            background-attachment: fixed;
        }

        form, h1 {
            background-color: rgb(0, 132, 203);
            box-shadow: 0px 4px 8px rgba(0, 0, 0, 0.5);
            padding: 20px;
            border-radius: 10px;
            display: inline-block;
        }

        label, h1 {
            font-size: 25px;
            color: rgb(255, 255, 255);
        }

        .message {
            color: rgba(63, 72, 204, 0.829);
        }

        h3 {
            color: rgb(255, 255, 255);
        }

        #signature-pad {
            border: 1px solid #000;
            width: 600px;
            height: 300px;
            background-color: #ffffff;
        }

        canvas {
            width: 100%;
            height: 100%;
        }

        .container {
            display: flex;
            flex-direction: column;
            align-items: center;
            text-align: center;
        }

        /* ===== Spinner estilo reloj giratorio ===== */
        .spinner {
            margin: 30px auto;
            width: 50px;
            height: 50px;
            border: 5px solid #ffffff;
            border-top: 5px solid #007bff; /* color parte superior */
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
    </style>
</head>
<body>

    <h1>
    <div class="popup">
        <p>🛠️ Generando PDF de formación.</p>
        <p>Por favor, espera un momento,</p>
        <p>se te redirigirá automáticamente...</p>
        <div class="spinner"></div> <!-- 🎉 Aquí va el reloj giratorio -->
    </div>
    </h1>

    <form id="pdfForm" action="{% url 'generar_pdf' %}" method="post" style="display:none;">
        {% csrf_token %}
        <input type="hidden" name="operario" value="{{ operario }}">
        <input type="hidden" name="puesto" value="{{ puesto }}">
    </form>

    <script>
        setTimeout(function() {
            document.getElementById("pdfForm").submit();
        }, 1500); // espera 1.5 segundos
    </script>

</body>
</html>
