{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Examen Práctico {{ puesto_seleccionado }}</title>
    <link rel="icon" type="image/x-icon" href="{% static 'favicon.ico' %}">
    <style>
        body {
            font-family: Arial, sans-serif;
            background-color: #eef1f5;
            padding: 30px;
        }

        form {
            max-width: 750px;
            margin: auto;
            background: white;
            padding: 40px;
            border-radius: 12px;
            box-shadow: 0 0 12px rgba(0, 0, 0, 0.1);
        }

        h1 {
            text-align: center;
            color: #222;
        }

        .pregunta {
            margin-bottom: 30px;
            padding: 15px;
            border: 1px solid #ccc;
            border-radius: 8px;
            background-color: #fdfdfd;
        }

        .pregunta strong {
            display: block;
            margin-bottom: 12px;
            color: #333;
        }

        .opcion {
            margin: 8px 0;
        }

        .opcion label {
            font-size: 15px;
        }

        .opcion input {
            margin-right: 8px;
        }

        button {
            display: block;
            margin: 30px auto 0;
            background-color: #007bff;
            color: white;
            padding: 12px 28px;
            border: none;
            border-radius: 6px;
            font-size: 16px;
            cursor: pointer;
        }

        button:hover {
            background-color: #0056b3;
        }

        .info {
            margin-bottom: 25px;
            text-align: center;
            color: #555;
        }

        .alert-card {
            background: #ffffff;
            color: #1f2937;
            border: 1px solid #e5e7eb;
            border-left: 6px solid #3b82f6;
            box-shadow: 0 6px 18px rgba(15, 23, 42, 0.12);
            padding: 12px 16px;
            margin: 12px auto;
            border-radius: 12px;
            max-width: 900px;
            text-align: center;
        }

        .alert-card.info {
            border-left-color: #0ea5e9;
            color: #0c4a6e;
        }

        .alert-card p,
        .alert-card h2,
        .alert-card h3 {
            margin: 0;
            color: inherit;
        }
    </style>
</head>
<body>

    <form method="post">
        {% csrf_token %}
        <h1>{{ titulo }}</h1>

        <div class="info alert-card info">
            <p><strong>Operario:</strong> {{ operario_nombre }}</p>
            <p><strong>Fecha:</strong> {{ fecha }}</p>
        </div>

        {% for pregunta in preguntas %}
            <div class="pregunta">
                <strong>{{ pregunta.indice }}. {{ pregunta.texto }}</strong>
                {% for opcion in pregunta.opciones %}
                    <div class="opcion">
                        <label>
                            <input type="radio" name="respuesta_{{ pregunta.indice }}" value="{{ opcion.letra }}" required>
                            {{ opcion.texto }}
                        </label>
                    </div>
                {% endfor %}
            </div>
        {% endfor %}

        <input type="hidden" name="operario_nombre" value="{{ operario_nombre }}">
        <input type="hidden" name="puesto_seleccionado" value="{{ puesto_seleccionado }}">

        <button type="submit">Enviar cuestionario</button>
    </form>

    <script>
        const tiempoInactividad = 15 * 60 * 1000; // 15 min en milisegundos
        let temporizadorInactividad;

        function reiniciarTemporizador() {
            clearTimeout(temporizadorInactividad);
            temporizadorInactividad = setTimeout(cerrarSesionPorInactividad, tiempoInactividad);
        }

        // Si quieres para pruebas rápidas, usa:
            // const tiempoInactividad = 10 * 1000; // 10 seg

        function cerrarSesionPorInactividad() {
            // Si quieres hacer logout por POST:
            fetch("{% url 'timeout' %}", {
                method: 'POST',
                headers: {'X-CSRFToken': '{{ csrf_token }}'}
            }).then(() => {
                window.location.href = "{% url 'timeout' %}";
            });
        }

        // Reiniciar temporizador en cualquier interacción
        document.addEventListener("mousemove", reiniciarTemporizador);
        document.addEventListener("keydown", reiniciarTemporizador);
        document.addEventListener("click", reiniciarTemporizador);

        reiniciarTemporizador(); // iniciar al cargar la página
    </script>

</body>
</html>
