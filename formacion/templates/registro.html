{% extends "base.html" %}

{% block content %}
  <h2>Crear cuenta</h2>
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button style="font-size: 18px; padding: 10px 30px;" type="submit">
      Registrarse <br><i class="fa fa-user-plus" aria-hidden="true"></i>
    </button>
  </form>
  <br><br>
  <a href="{% url 'login' %}">¿Ya tienes cuenta? Inicia sesión</a>
  
  {% if messages %}
    <div class="messages">
    {% for message in messages %}
        <div class="alert-card {{ message.tags }}">{{ message }}</div>
    {% endfor %}
    </div>
  {% endif %}
{% endblock %}
